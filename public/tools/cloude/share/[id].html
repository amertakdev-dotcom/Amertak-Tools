<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudShare | Download file</title>
  <link rel="stylesheet" href="/tools/cloude/style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="panel" style="max-width: 760px; margin: 40px auto;">
      <div class="panel-heading">
        <div class="panel-icon">⬇</div>
        <div>
          <h2>Download your file</h2>
          <p id="metaText">Loading file details…</p>
        </div>
      </div>
      <div id="downloadState" class="result-area empty">
        <p class="empty-text">Preparing your download…</p>
      </div>
    </div>
  </div>
  <script src="/tools/cloude/share.js"></script>
</body>
</html>
