<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenAI Speech to Text Test</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:40px}
.box{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px #ccc}
button,input{width:100%;padding:12px;margin:10px 0}
pre{background:#eee;padding:10px;min-height:150px;white-space:pre-wrap}
</style>
</head>
<body>

<div class="box">
<h2>Speech to Text Test</h2>

<input type="file" id="audio" accept="audio/*">

<button id="btn">Transcribe</button>

<pre id="result"></pre>

</div>

<script>
const API_KEY="";

document.getElementById("btn").onclick=async()=>{

const file=document.getElementById("audio").files[0];

if(!file){
alert("Select audio");
return;
}

const form=new FormData();

form.append("file",file);
form.append("model","gpt-4o-transcribe");

const res=await fetch("https://api.openai.com/v1/audio/transcriptions",{

method:"POST",

headers:{
Authorization:"Bearer "+API_KEY
},

body:form

});

const data=await res.json();

console.log(data);

document.getElementById("result").textContent=
data.text || JSON.stringify(data,null,2);

};
</script>

</body>
</html>
