<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>អមតៈ - Amertak | AI Assistant</title>
    
    <!-- ===== API CONFIGURATION ===== -->
    <script src="/ai/js/config.js"></script>
    <!-- ================================ -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="/ai/css/styles.css">
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="header glass-panel">
        <div class="logo">
            <img src="/svg/logo.svg">
        </div>
        <div class="flex items-center gap-3">
            <!-- Model Selector -->
            <div class="model-selector-dropdown">
                <button class="model-selector-btn" id="modelSelectorBtn" onclick="toggleModelDropdown()">
                    <span class="material-symbols-outlined" style="font-size: 16px;" id="modelIcon">tune</span>
                    <span id="currentModelName">Loading...</span>
                    <span class="material-symbols-outlined" style="font-size: 14px;">expand_more</span>
                </button>
                <div id="modelDropdown" class="model-dropdown-menu">
                    <!-- Will be populated dynamically -->
                </div>
            </div>
            <a class="text-primary p-2 hover:bg-surface-container-high/50 rounded-full transition-all" href="https://t.me/Amertak_Network" target="_blank" title="Join Telegram">
                <span class="material-symbols-outlined">send</span>
            </a>
        </div>
    </header>

    <!-- Chat Area -->
    <main id="chatContainer" class="flex-1 overflow-y-auto chat-scroll px-margin-mobile md:px-8 lg:px-12 pt-stack-xl pb-[350px] space-y-6">
        <!-- Welcome Message -->
        <div class="welcome-container">
            <div class="welcome-icon glass-bubble flex items-center justify-center relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-tr from-purple-500/10 via-blue-500/10 to-pink-500/10 opacity-50" style="transition: opacity 0.5s;"></div>
                <span class="material-symbols-outlined sparkle-gradient" style="font-size: 56px; font-weight: bold; position: relative; z-index: 10;">auto_awesome</span>
            </div>
            <div class="space-y-3">
                <h1 class="font-headline-lg-mobile font-bold text-on-surface drop-shadow-sm tracking-tight">អមតៈ អេអាយ</h1>
                <p class="text-on-surface-variant font-label-md text-sm opacity-80" style="max-width: 32rem; margin: 0 auto;">មានអ្វីសួរទៅ អមតៈ អេអាយ?</p>
            </div>
            <div class="feature flex flex-wrap gap-2 justify-center" style="max-width: 42rem; margin: 0 auto; padding-top: 1rem;">
                <div class="glass-bubble rounded-xl px-4 py-2 text-xs text-on-surface-variant">
                    <span class="material-symbols-outlined text-primary" style="font-size: 16px;">chat</span>
                    <span class="ml-1">ជជែកជាមួយ AI</span>
                </div>
                <div class="glass-bubble rounded-xl px-4 py-2 text-xs text-on-surface-variant">
                    <span class="material-symbols-outlined text-secondary" style="font-size: 16px;">calculate</span>
                    <span class="ml-1">គណិតវិទ្យា</span>
                </div>
                <div class="glass-bubble rounded-xl px-4 py-2 text-xs text-on-surface-variant">
                    <span class="material-symbols-outlined text-primary" style="font-size: 16px;">book</span>
                    <span class="ml-1">ប្រវត្តិវិទ្យា</span>
                </div>
                <div class="glass-bubble rounded-xl px-4 py-2 text-xs text-on-surface-variant" style="display: none;">
                    <span class="material-symbols-outlined text-secondary" style="font-size: 16px;">info</span>
                    <span class="ml-1">ទាក់ទងខ្ញុំ</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Input Area -->
    <div class="bottom-gradient">
        <div class="max-w-4xl mx-auto space-y-3 px-4 pb-6">
            <!-- Mode Selector -->
            <div class="mode-selector">
                <button onclick="mode_dropdown()" class="mode-badge drop" id="mode-drop">
                    <span class="material-symbols-outlined" style="font-size: 16px; position: relative; z-index: 10;">arrow_downward</span>
                </button>
                <button onclick="setMode('chat')" class="mode-badge active" id="mode-chat">
                    <span class="material-symbols-outlined" style="font-size: 16px; position: relative; z-index: 10;">chat_bubble</span>
                    <span class="mode">ជជែក</span>
                </button>
                <button onclick="setMode('math')" class="mode-badge inactive" id="mode-math">
                    <span class="material-symbols-outlined" style="font-size: 16px; position: relative; z-index: 10;">calculate</span>
                    <span class="mode">គណិតវិទ្យា</span>
                </button>
                <button onclick="setMode('history')" class="mode-badge inactive" id="mode-history">
                    <span class="material-symbols-outlined" style="font-size: 16px; position: relative; z-index: 10;">book</span>
                    <span class="mode">ប្រវត្តិវិទ្យា</span>
                </button>
                <button onclick="setMode('contact')" class="mode-badge inactive" id="mode-contact" style="display: none;">
                    <span class="material-symbols-outlined" style="font-size: 16px; position: relative; z-index: 10;">info</span>
                    <span class="mode">ទាក់ទងខ្ញុំ</span>
                </button>
            </div>

            <!-- Suggested Prompts -->
            <div id="suggestionsContainer" class="suggestionsContainer">
                <!-- Will be populated based on mode -->
            </div>

            <!-- File Preview -->
            <div id="filePreviewContainer" class="file-preview hidden"></div>

            <!-- Input Field -->
            <div class="input-container group" style="max-width: 100%;">
                <div class="absolute inset-0 rounded-[2rem] bg-[length:300%_300%] animate-rgb-border opacity-40"></div>
                <div class="input-wrapper relative rounded-[calc(2rem-2px)] p-2 sm:p-3 flex items-center gap-1 sm:gap-3" style="z-index: 10;">
                    <div class="absolute inset-0 bg-gradient-to-r from-purple-400/0 via-blue-400/5 to-cyan-400/0 opacity-0" style="transition: opacity 1s; pointer-events: none;"></div>
                    
                    <div class="flex items-center gap-1 z-10 relative">
                        <button id="attachBtn" class="flex items-center justify-center rounded-full transition-all flex-shrink-0" style="width: 2.75rem; height: 2.75rem; color: var(--outline);">
                            <span class="material-symbols-outlined" style="font-size: 20px;">attach_file</span>
                        </button>
                        
                        <!-- Attachment Menu -->
                        <div id="attachmentMenu" class="attachment-menu hidden">
                            <button onclick="openFileImport()">
                                <span class="material-symbols-outlined">folder_open</span>
                                <span class="txt">ឯកសារ</span>
                            </button>
                            <button onclick="openGallery()">
                                <span class="material-symbols-outlined">image</span>
                                <span class="txt">រូបថត</span>
                            </button>
                        </div>
                    </div>
                    
                    <textarea class="flex-1 bg-transparent border-none outline-none resize-none" id="chatInput" oninput="autoResize(this)" placeholder="សរសេរសាររបស់អ្នក..." rows="1"></textarea>
                    <button id="sendBtn" class="flex items-center justify-center rounded-full shadow-md active:scale-90 transition-all flex-shrink-0 mr-1" style="color: white; height: 2.75rem; width: 2.75rem; border: 2px solid var(--border); position: relative; z-index: 10;">
                        <span class="material-symbols-outlined" style="font-weight: bold; font-size: 18px; position: relative; z-index: 1;">arrow_upward</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Inputs -->
    <input type="file" id="fileInput" class="hidden" multiple>
    <input type="file" id="galleryInput" class="hidden" accept="image/*">

    <script src="/ai/js/app.js"></script>
    <script src="/ai/js/chat.js"></script>
</body>
</html>
