<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Amertak Tools</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .auth-page { max-width: 420px; margin: 4rem auto; padding: 2rem; background: rgba(255,255,255,0.92); border-radius: 18px; box-shadow: 0 18px 40px rgba(0,0,0,0.12); }
    .auth-page h1 { font-size: 2rem; margin-bottom: 1rem; }
    .auth-page form { display: grid; gap: 1rem; }
    .auth-page input { width: 100%; padding: 0.95rem 1rem; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
    .auth-page button { padding: 0.95rem 1rem; border:none; border-radius: 10px; background: #0c5bff; color:#fff; font-weight:600; cursor:pointer; }
    .auth-page .message { padding: 0.9rem 1rem; border-radius: 10px; background: #effffe; color: #0a3d7f; }
    .auth-page p { margin-top: 1rem; text-align: center; }
    .auth-page a { color: #0c5bff; text-decoration: none; }
  </style>
</head>
<body>
  <main class="auth-page">
    <h1>Register</h1>
    <div id="status"></div>
    <form id="registerForm">
      <input type="text" id="name" name="name" placeholder="Full Name" required>
      <input type="email" id="email" name="email" placeholder="Email" required>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="/login">Login here</a></p>
  </main>
  <script src="/auth.js"></script>
</body>
</html>
